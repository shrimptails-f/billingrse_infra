# DBインスタンス作成時、スキーマ・ユーザーの作成が必要なため、それを実行するタスク定義で使うECRをプッシュします。
name: Push DB Init Image

permissions:
  id-token: write
  contents: read

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "db-init-toolsのイメージタグを指定してください"
        required: false
        default: "latest"

jobs:
  push:
    name: Build and push DB init image
    runs-on: ubuntu-latest
    environment: dev
    env:
      AWS_REGION: ap-northeast-1
      ECR_REPOSITORY: billingrse-dev-db-init
      IMAGE_NAME: billingrse-dev-db-init
      IMAGE_TAG: ${{ github.event.inputs.image_tag }}
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names "${ECR_REPOSITORY}" >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name "${ECR_REPOSITORY}"

      - name: Build DB init image
        working-directory: ecr_image/db_init
        run: |
          docker build \
            --no-cache \
            -t ${IMAGE_NAME}:${IMAGE_TAG} \
            -f Dockerfile .

      - name: Tag image for ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker tag ${IMAGE_NAME}:${IMAGE_TAG} ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}

      - name: Push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker push ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}
