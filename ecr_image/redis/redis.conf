# Minimal Redis config for rate-limit counters in a private subnet.
# Replace `requirepass` with a real secret before use.

protected-mode yes
bind 0.0.0.0

# Auth (set to your secret)
requirepass changeme

# Memory policy: cap usage and evict LRU keys if full.
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence: disabled (in-memory only for counters).
appendonly no
save ""

# Network/ops hardening.
tcp-keepalive 60
rename-command FLUSHALL ""
rename-command FLUSHDB ""

# Log to stdout
logfile ""
